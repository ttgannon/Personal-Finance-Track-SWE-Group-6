{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h1 class="auth-title">WealthWise</h1>
    <h4 class="auth-subtitle">Sign in to your account</h4>

    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-danger">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}
        {{ form.username }}
        {{ form.password }}
        <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <div class="auth-links">
        <small>Don't have an account? <a href="{% url 'register' %}">Sign up here</a></small>
    </div>
</div>
{% endblock %}
