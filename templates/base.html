<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07090f;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #f0f2f8;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated orbs */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 15% 15%, rgba(99,102,241,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 85% 85%, rgba(139,92,246,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 35% at 60% 20%, rgba(6,182,212,0.08) 0%, transparent 65%);
    }
    .orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%); }
    .orb-2 { width: 300px; height: 300px; bottom: -80px; right: -80px; background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%); animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(20px,-15px) scale(1.05); }
      66%       { transform: translate(-10px,10px) scale(0.97); }
    }

    .auth-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 1.5rem;
    }

    .auth-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .auth-logo {
      display: flex; align-items: center; gap: 0.6rem;
      justify-content: center; margin-bottom: 2rem;
    }
    .auth-logo-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.1rem; color: #fff;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }
    .auth-logo-text {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-title {
      font-size: 1.4rem; font-weight: 800; color: #f0f2f8;
      text-align: center; margin-bottom: 0.4rem; letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 0.85rem; color: #8892a4;
      text-align: center; margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: #8892a4; margin-bottom: 0.4rem; letter-spacing: 0.03em; text-transform: uppercase; }
    .form-control {
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #f0f2f8;
      font-size: 0.9rem; font-family: inherit;
      transition: all 0.2s; outline: none;
    }
    .form-control:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.08);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .form-control::placeholder { color: rgba(136,146,164,0.5); }

    .btn-primary {
      width: 100%; padding: 0.8rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 10px;
      color: #fff; font-size: 0.9rem; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      margin-top: 0.5rem;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.5); }
    .btn-primary:active { transform: none; }

    .alert {
      padding: 0.85rem 1rem; border-radius: 10px;
      font-size: 0.82rem; margin-bottom: 1.25rem;
    }
    .alert-danger {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }
    .alert-danger ul { margin: 0; padding-left: 1.2rem; }

    .auth-divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.25rem 0; color: #8892a4; font-size: 0.78rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }

    .auth-link-row {
      text-align: center; margin-top: 1.5rem;
      font-size: 0.82rem; color: #8892a4;
    }
    .auth-link-row a { color: #6366f1; text-decoration: none; font-weight: 600; }
    .auth-link-row a:hover { color: #8b5cf6; }

    .terms-note {
      text-align: center; font-size: 0.72rem; color: #8892a4;
      margin-top: 1rem; line-height: 1.5;
    }
    .terms-note a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">W</div>
        <span class="auth-logo-text">WealthWise</span>
      </div>
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
