name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PIPELINE: local
      SECRET_KEY: ci-secret-key-not-used-in-production
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      DB_HOST: localhost
      DB_PORT: 5432
      # Plaid not needed for unit tests
      PLAID_CLIENT_ID: ""
      PLAID_SECRET: ""
      PLAID_ENV: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --settings=wealthwise.settings.local --noinput

      - name: Run tests
        run: python manage.py test --settings=wealthwise.settings.local --verbosity=2
